        .server-details { font-size: 0.9em; color: #ccc; }

    <script>
        const STORAGE_KEY = 'squadServerSuperfilterState';

        const defaultSettings = {
            playerCount: "40",
            maxPlayerCount: "86",
            regions: ["Europe"],
            modes: ["RAAS", "AAS", "Invasion", "Insurgency"],
            maps: [
                "Harju", "Skorpo", "Belaya", "Black Coast", "Fool's Road", "Gorodok", "Mestia", "Narva", "Yehorivka", 
                "Manicouagan", "Goose Bay", "Sanxian Islands", "Al Basrah"
            ],
            excludedCountries: []
        };

        function saveState() {
            const state = {
                playerCount: document.getElementById('playerCount').value,
                maxPlayerCount: document.getElementById('maxPlayerCount').value,
                regions: Array.from(document.querySelectorAll('input[name="region"]:checked')).map(cb => cb.value),
                modes: Array.from(document.querySelectorAll('input[name="mode"]:checked')).map(cb => cb.value),
                maps: Array.from(document.querySelectorAll('input[name="map"]:checked')).map(cb => cb.value),
                excludedCountries: Array.from(document.querySelectorAll('input[name="excludedCountry"]:checked')).map(cb => cb.value)
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function loadState() {
            const saved = localStorage.getItem(STORAGE_KEY);
            const state = saved ? JSON.parse(saved) : defaultSettings;

            document.getElementById('playerCount').value = state.playerCount;
            document.getElementById('maxPlayerCount').value = state.maxPlayerCount || "86";

            document.querySelectorAll('input[name="region"]').forEach(cb => {
                cb.checked = state.regions.includes(cb.value);
            });
            document.querySelectorAll('input[name="mode"]').forEach(cb => {
                cb.checked = state.modes.includes(cb.value);
            });
            document.querySelectorAll('input[name="map"]').forEach(cb => {
                cb.checked = state.maps.includes(cb.value);
            });
            document.querySelectorAll('input[name="excludedCountry"]').forEach(cb => {
                cb.checked = (state.excludedCountries || []).includes(cb.value);
            });
        }

        function init() {
            loadState();
            document.querySelectorAll('input').forEach(input => {
                input.addEventListener('change', saveState);
            });
        }

        window.onload = init;

        async function fetchAllServers(resultsDiv) {
    const allServers = [];
    let nextUrl = 'https://api.battlemetrics.com/servers?filter%5Bgame%5D=squad&page%5Bsize%5D=100';
    let pageNum = 1;

    while (nextUrl) {
        resultsDiv.textContent =
            `Fetching page ${pageNum}… (${allServers.length} servers so far)`;

        const response = await fetch(nextUrl, {
            headers: { "Accept": "application/vnd.api+json" }
        });

        const data = await response.json();

        // Treat BattleMetrics "Invalid Response" 500 as end-of-pagination
        if (
            data &&
            Array.isArray(data.errors) &&
            data.errors.some(error =>
                error.status === "500" &&
                error.title === "Invalid Response"
            )
        ) {
            console.warn(
                `[Squad Server Superfilter] Reached end of pagination at page ${pageNum}.`,
                data
            );
            break;
        }

        // Normal end condition
        if (!data || !Array.isArray(data.data)) {
            console.warn(
                `[Squad Server Superfilter] Unexpected response on page ${pageNum}, stopping pagination.`,
                data
            );
            break;
        }

        allServers.push(...data.data);

        nextUrl =
            data.links && data.links.next
                ? data.links.next
                : null;

        pageNum++;
    }

    return allServers;
}

        async function filterServers() {
            const resultsDiv = document.getElementById('results');
            resultsDiv.style.display = "block";
            resultsDiv.textContent = "Fetching and filtering...";

            const minPlayersInput = parseInt(document.getElementById('playerCount').value) || 0;
            const maxPlayersInput = parseInt(document.getElementById('maxPlayerCount').value) || 98;

            const selectedRegions = Array.from(document.querySelectorAll('input[name="region"]:checked')).map(cb => cb.value);
            const excludedCountries = Array.from(document.querySelectorAll('input[name="excludedCountry"]:checked')).map(cb => cb.value);

            const regionMap = {
                "Europe": ["DE", "FR", "GB", "NL", "SE", "FI", "PL", "ES", "IT", "RU", "UA", "CH", "AT", "DK", "NO", "BE", "IE", "PT", "CZ", "RO",
                           "TR", "HU", "SK", "HR", "RS", "BG", "GR", "LT", "LV", "EE", "SI", "LU", "MK", "AL", "BA", "ME", "MD", "BY", "GE", "AM", "AZ", "KZ"],
                "North America": ["US", "CA", "MX"],
                "Asia": ["CN", "JP", "KR", "SG", "TW", "HK", "MY", "TH", "VN", "IN", "ID", "PH"],
                "Australia": ["AU", "NZ"],
                "Africa": ["ZA", "EG", "MA", "KE", "NG"],
                "South America": ["BR", "AR", "CL", "CO", "PE", "UY"]
            };

            try {
                const allServers = await fetchAllServers(resultsDiv);
                resultsDiv.textContent = `Fetched ${allServers.length} servers total, filtering…`;

                const filtered = allServers.filter(server => {
                    const attr = server.attributes;
                    
                    if ((attr.players || 0) < minPlayersInput) return false;
                    if ((attr.players || 0) > maxPlayersInput) return false;
                    
                    if (selectedRegions.length > 0) {
                        const isMatch = selectedRegions.some(regionName => 
                            regionMap[regionName] && regionMap[regionName].includes(attr.country)
                        );
                        if (!isMatch) return false;
                    }

                    if (excludedCountries.length > 0 && excludedCountries.includes(attr.country)) return false;

                    return true;
                });
                
                let htmlOutput = `<h3>Found ${filtered.length} servers (out of ${allServers.length} total fetched):</h3>`;
                filtered.forEach(s => {
                    htmlOutput += `
                        <div style="background:#333; padding:10px; margin:5px 0; border-radius:5px;">
                            <strong>${s.attributes.name}</strong><br>
                            Players: ${s.attributes.players} | Country: ${s.attributes.country}
                        </div>`;
                });
                resultsDiv.innerHTML = htmlOutput;
            } catch(err) {
                resultsDiv.textContent = "Error: " + err.message;
            }
        }
    </script>
